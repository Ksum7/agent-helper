# Upstream (группа инстансов Node.js)
upstream nodejs_cluster {
    # Балансирует по количеству активных соединений
    least_conn;

    # По умолчанию PM2 запускает инстансы на портах 3000, 3001, 3002 и т.д.
    # Если используешь экземпляры на одной машине:
    server localhost:3000 max_fails=3 fail_timeout=30s;
    server localhost:3001 max_fails=3 fail_timeout=30s;
    server localhost:3002 max_fails=3 fail_timeout=30s;

    # Если на разных серверах (замени на реальные IP):
    # server 192.168.1.10:3000 max_fails=3 fail_timeout=30s;
    # server 192.168.1.11:3000 max_fails=3 fail_timeout=30s;
    # server 192.168.1.12:3000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name localhost;

    # Увеличить максимальный размер тела запроса (для загрузки файлов)
    client_max_body_size 100M;

    # Обычные HTTP запросы
    location / {
        proxy_pass http://nodejs_cluster;

        # Важные заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket поддержка для Socket.io
    location /socket.io {
        proxy_pass http://nodejs_cluster;

        # Обновляем протокол для WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Длительные таймауты для WebSocket
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Healthcheck эндпоинт (опционально)
    location /health {
        proxy_pass http://nodejs_cluster;
        access_log off;
    }
}
