services:
  vllm-llm:
    image: vllm/vllm-openai:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - vllm_llm_cache:/root/.cache/huggingface
    ports:
      - '8000:8000'
    command: >
      --model Qwen/Qwen3-14B-AWQ
      --max-model-len 4096
      --dtype auto
      --gpu-memory-utilization 0.75
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm-embed:
    image: vllm/vllm-openai:latest
    environment:
      - HF_TOKEN=${HF_TOKEN} 
    volumes:
      - vllm_embed_cache:/root/.cache/huggingface
    command: >
      --model intfloat/e5-small-v2
      --dtype auto
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm-rerank:
    image: vllm/vllm-openai:latest
    environment:
      - HF_TOKEN=${HF_TOKEN} 
    volumes:
      - vllm_rerank_cache:/root/.cache/huggingface
    command: >
      --model BAAI/bge-reranker-v2-m3
      --dtype auto
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_helper
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

volumes:
  vllm_llm_cache:
  vllm_embed_cache:
  vllm_rerank_cache:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
