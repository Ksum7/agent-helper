services:
  vllm-llm:
    image: vllm/vllm-openai:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - vllm_llm_cache:/root/.cache/huggingface
    ports:
      - '8000:8000'
    command: >
      --model Qwen/Qwen3-14B-AWQ
      --max-model-len 16000
      --dtype auto
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --cpu-offload-gb 4
      --swap-space 8
      --gpu-memory-utilization 0.95
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 10s
      timeout: 10s
      retries: 60
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm-embed:
    image: vllm/vllm-openai:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - vllm_embed_cache:/root/.cache/huggingface
    command: >
      --model intfloat/e5-small-v2
      --dtype auto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 10s
      timeout: 10s
      retries: 60
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm-rerank:
    image: vllm/vllm-openai:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - vllm_rerank_cache:/root/.cache/huggingface
    command: >
      --model BAAI/bge-reranker-v2-m3
      --dtype auto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 10s
      timeout: 10s
      retries: 60
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_helper
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run start:dev
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    env_file: .env
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio
      - VLLM_LLM_URL=http://vllm-llm:8000/v1
      - VLLM_EMBED_URL=http://vllm-embed:8000/v1
      - VLLM_RERANK_URL=http://vllm-rerank:8000/v1
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 10s
      retries: 60
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      vllm-llm:
        condition: service_healthy
      vllm-embed:
        condition: service_healthy
      vllm-rerank:
        condition: service_healthy

  sandbox:
    build: ./sandbox
    ports:
      - '3001:3001'
    mem_limit: 128m
    cpus: '0.5'
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  vllm_llm_cache:
  vllm_embed_cache:
  vllm_rerank_cache:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
