services:
  vllm-llm:
    image: vllm/vllm-openai:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - vllm_llm_cache:/root/.cache/huggingface
    ports:
      - '8000:8000'
    command: >
      --model Qwen/Qwen3-14B-AWQ
      --max-model-len 4096
      --dtype auto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 5m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm-embed:
    image: vllm/vllm-openai:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - vllm_embed_cache:/root/.cache/huggingface
    command: >
      --model intfloat/e5-small-v2
      --dtype auto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 5m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm-rerank:
    image: vllm/vllm-openai:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - vllm_rerank_cache:/root/.cache/huggingface
    command: >
      --model BAAI/bge-reranker-v2-m3
      --dtype auto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 5m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_helper
    ports:
      - '5433:5432'
    volumes:
      - postgres_data_cluster:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data_cluster:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data_cluster:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data_cluster:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build: .
    command: npm run cluster:start
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - VLLM_LLM_URL=http://vllm-llm:8000/v1
      - VLLM_EMBED_URL=http://vllm-embed:8000/v1
      - VLLM_RERANK_URL=http://vllm-rerank:8000/v1
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 3m
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      vllm-llm:
        condition: service_healthy
      vllm-embed:
        condition: service_healthy
      vllm-rerank:
        condition: service_healthy

volumes:
  vllm_llm_cache:
  vllm_embed_cache:
  vllm_rerank_cache:
  postgres_data_cluster:
  redis_data_cluster:
  qdrant_data_cluster:
  minio_data_cluster:
